<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>OTJ — Shape the Future of Creative Work</title>
    <meta name="description" content="Help us build the right platform for the creative industry in MENA." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
    <link href="https://fonts.cdnfonts.com/css/neue-haas-grotesk-display-pro" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { background: #fff; height: 100%; -webkit-font-smoothing: antialiased; }
      #root { min-height: 100vh; }
      ::-webkit-scrollbar { display: none; }
      @keyframes slideUp {
        from { opacity: 0; transform: translateY(18px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      .step-anim { animation: slideUp 0.35s cubic-bezier(0.22,1,0.36,1) both; }
      .fade-anim { animation: fadeIn 0.3s ease both; }
      input, textarea { font-family: 'DM Sans', sans-serif; font-size: 16px; }
      input:focus, textarea:focus { outline: none; }
      button { cursor: pointer; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
